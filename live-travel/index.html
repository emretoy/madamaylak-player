<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Where We've Traveled — Madam Aylak</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:ital@1&family=Great+Vibes&family=Inter:wght@500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f4eedd;color:#3a3020;font-family:Inter;display:flex;flex-direction:column;
 align-items:center;min-height:100vh;overflow-x:hidden;padding:20px 16px 30px;
 background-image:radial-gradient(120% 80% at 50% 0%,#faf5e6,#e9ddc2 100%);}
.logo{font-weight:600;letter-spacing:.4em;font-size:11px;color:#bf6a43;text-transform:uppercase;margin:6px 0 2px;}
.kick{font:600 12px Inter;letter-spacing:.42em;text-transform:uppercase;color:#9a8c72;margin-bottom:16px;}
.stage{position:relative;width:min(430px,92vw);aspect-ratio:3/4;border-radius:14px;overflow:hidden;
 box-shadow:0 22px 50px rgba(58,48,32,.32);border:7px solid #fff;background:#000;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease;}
.slide.on{opacity:1;}
.slide img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.cap{position:absolute;left:0;right:0;bottom:0;padding:52px 18px 16px;
 background:linear-gradient(to top,rgba(40,30,18,.86),transparent);text-align:center;}
.place{font-family:'Playfair Display';font-weight:700;font-size:24px;color:#fff;}
.idx{font-family:'Cormorant Garamond';font-style:italic;font-size:15px;color:#f0d9a8;margin-top:1px;}
.head{position:absolute;left:0;right:0;top:0;z-index:3;padding:14px 16px 30px;
 background:linear-gradient(to bottom,rgba(40,30,18,.7),transparent);text-align:center;}
.names{font-family:'Great Vibes';font-size:34px;color:#f0d9a8;line-height:1;}
.play{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;
 background:rgba(40,30,18,.46);cursor:pointer;transition:opacity .6s;}
.pbtn{width:80px;height:80px;border-radius:50%;border:2px solid #f0d9a8;display:flex;align-items:center;
 justify-content:center;background:rgba(240,217,168,.18);}
.pbtn:after{content:'';border-left:23px solid #fff;border-top:14px solid transparent;border-bottom:14px solid transparent;margin-left:7px;}
.phint{margin-top:15px;font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#f0d9a8;}
.dots{display:flex;gap:7px;margin-top:16px;}
.dots i{width:7px;height:7px;border-radius:50%;background:#d8c6a3;transition:background .3s;}
.dots i.on{background:#bf6a43;}
.bars{display:flex;gap:4px;align-items:flex-end;height:26px;margin-top:14px;}
.bars i{width:4px;background:linear-gradient(to top,#bf6a43,#dca06a);border-radius:2px;height:5px;}
.meta{margin-top:14px;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#9a8c72;text-align:center;}
.capf{margin-top:6px;font-family:'Cormorant Garamond';font-style:italic;font-size:15px;color:#bf6a43;}
.foot{margin-top:16px;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:#a99a7e;}
</style></head><body>
 <div class="logo">Madam Aylak</div>
 <div class="kick">Where We've Traveled</div>
 <div class="stage" id="stage">
   <div class="head"><div class="names">Emma &amp; James</div></div>
   <div class="play" id="play"><div class="pbtn"></div><div class="phint">tap to relive our journeys</div></div>
 </div>
 <div class="dots" id="dots"></div>
 <div class="bars" id="bars"></div>
 <div class="meta">6 places · 6 countries · 5,263 km together</div>
 <div class="capf">your song, kept forever</div>
 <div class="foot">Madam Aylak · Living Travel Map</div>
<audio id="aud" src="song.mp3" crossorigin="anonymous" preload="auto"></audio>
<script>
const PLACES=[["p1.jpg","Paris","France"],["p2.jpg","Amsterdam","Netherlands"],["p3.jpg","Rome","Italy"],
 ["p4.jpg","Barcelona","Spain"],["p5.jpg","Santorini","Greece"],["p6.jpg","Istanbul","Turkey"]];
const stage=document.getElementById('stage'),dotsEl=document.getElementById('dots');
const slides=[];
PLACES.forEach((pl,i)=>{const s=document.createElement('div');s.className='slide';
 s.innerHTML=`<img src="${pl[0]}"/><div class="cap"><div class="place">${pl[1]}</div><div class="idx">${pl[2]} · ${i+1} of ${PLACES.length}</div></div>`;
 stage.insertBefore(s,stage.firstChild);slides.push(s);
 const d=document.createElement('i');dotsEl.appendChild(d);});
const dots=[...dotsEl.children];
let cur=0;function show(i){slides.forEach((s,k)=>s.classList.toggle('on',k===i));dots.forEach((d,k)=>d.classList.toggle('on',k===i));cur=i;}
show(0);
const bars=document.getElementById('bars');for(let i=0;i<30;i++)bars.appendChild(document.createElement('i'));
const bA=[...bars.children];const aud=document.getElementById('aud');
let ac,an,freq,started=false,reactive=false,timer=null;
function initAudio(){try{ac=new (window.AudioContext||window.webkitAudioContext)();
 const s=ac.createMediaElementSource(aud);an=ac.createAnalyser();an.fftSize=128;
 freq=new Uint8Array(an.frequencyBinCount);s.connect(an);an.connect(ac.destination);reactive=true;}catch(e){reactive=false;}}
function frame(ts){
 if(reactive&&an){an.getByteFrequencyData(freq);for(let i=0;i<bA.length;i++){const v=(freq[i*2]||0)/255;bA[i].style.height=(5+v*22)+'px';}}
 else{const t=ts/1000;for(let i=0;i<bA.length;i++){const v=(Math.sin(t*5+i*0.5)*0.5+0.5)*(0.4+0.6*Math.abs(Math.sin(t*1.1+i)));bA[i].style.height=(5+v*18)+'px';}}
 if(!aud.paused)requestAnimationFrame(frame);}
document.getElementById('play').addEventListener('click',function(){
 if(!started){initAudio();started=true;}
 if(ac&&ac.state==='suspended')ac.resume();
 aud.play();this.style.opacity=0;setTimeout(()=>this.style.display='none',600);
 timer=setInterval(()=>show((cur+1)%slides.length),3500);
 requestAnimationFrame(frame);});
aud.addEventListener('ended',()=>{clearInterval(timer);for(const b of bA)b.style.height='5px';});
</script></body></html>
