<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meet My Pet — Madam Aylak</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Inter:wght@500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:radial-gradient(120% 80% at 50% 0%,#f4eedd,#e9ddc2);
font-family:Inter;color:#332c22;display:flex;flex-direction:column;align-items:center;
padding:46px 18px 56px;text-align:center;overflow-x:hidden;}
.logo{font-weight:600;letter-spacing:.32em;font-size:11px;color:#9a8c72;text-transform:uppercase;margin-bottom:18px;}
.kick{font-weight:600;letter-spacing:.46em;font-size:11px;color:#9a8c72;text-transform:uppercase;text-indent:.46em;margin-bottom:18px;}
.pho{width:min(180px,46vw);height:min(180px,46vw);border-radius:50%;object-fit:cover;object-position:50% 38%;
border:5px solid #fff;box-shadow:0 8px 22px rgba(51,44,34,.2);margin-bottom:18px;flex:none;display:none;}
.name{font-family:'Playfair Display';font-weight:700;font-size:54px;line-height:1;}
.breed{font-family:'Cormorant Garamond';font-style:italic;font-size:22px;color:#bf6a43;margin-top:4px;}
.play{margin:24px 0 6px;width:74px;height:74px;border-radius:50%;background:#bf6a43;border:none;cursor:pointer;
display:none;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(191,106,67,.4);}
.tri{width:0;height:0;border-left:22px solid #fff;border-top:14px solid transparent;border-bottom:14px solid transparent;margin-left:6px;}
.tap{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#9a8c72;margin-bottom:6px;display:none;}
.cols{width:100%;max-width:430px;margin-top:26px;}
.sect{margin-bottom:22px;}
.ct{font-weight:600;letter-spacing:.24em;font-size:12px;text-transform:uppercase;color:#bf6a43;
padding-bottom:8px;margin-bottom:6px;border-bottom:1.5px solid rgba(191,106,67,.4);text-align:left;}
.r{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:9px 0;}
.rl{font-weight:500;font-size:15px;color:#9a8c72;text-align:left;}
.rv{font-family:'Cormorant Garamond';font-weight:600;font-size:20px;color:#332c22;text-align:right;}
.traits{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:6px 0 0;}
.pill{font-weight:600;font-size:14px;color:#332c22;border:1.5px solid #bf6a43;border-radius:30px;padding:8px 18px;background:#fff8;}
.motto{font-family:'Cormorant Garamond';font-style:italic;font-size:21px;line-height:1.45;color:#332c22;max-width:420px;margin:28px 0 0;}
.foot{margin-top:34px;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#b3a98f;}
</style></head><body>
<div class="logo">Madam Aylak</div>
<div class="kick">All About</div>
<img class="pho" id="pho">
<div class="name" id="name">Your Pet</div>
<div class="breed" id="breed"></div>
<button class="play" id="play"><span class="tri"></span></button>
<div class="tap" id="tap">Tap to hear them</div>
<div class="cols" id="cols"></div>
<div class="traits" id="traits"></div>
<div class="motto" id="motto"></div>
<div class="foot">Madam Aylak &middot; The Official File</div>
<audio id="a" preload="auto"></audio>
<script>
const SB='https://frpfibrdjhpbemjutnwo.supabase.co/storage/v1/object/public/pet-sounds/';
const q=new URLSearchParams(location.search);
const slug=q.get('s')||'';
const $=id=>document.getElementById(id);
function rows(title,arr){
  if(!arr||!arr.length)return'';
  let h='<div class="sect"><div class="ct">'+title+'</div>';
  arr.forEach(([l,v])=>{if(v)h+='<div class="r"><span class="rl">'+l+'</span><span class="rv">'+v+'</span></div>';});
  return h+'</div>';
}
async function load(){
  if(!slug)return;
  // foto
  const im=$('pho');im.onload=()=>im.style.display='block';im.src=SB+slug+'/photo.jpg';
  try{
    const r=await fetch(SB+slug+'/profile.json',{cache:'no-store'});
    const d=await r.json();
    if(d.name)$('name').textContent=d.name;
    if(d.breed)$('breed').textContent=d.breed;
    $('cols').innerHTML=rows('Profile',d.profile)+rows('Favourites',d.favs);
    if(d.traits)$('traits').innerHTML=d.traits.map(t=>'<span class="pill">'+t+'</span>').join('');
    if(d.motto)$('motto').textContent='“'+d.motto+'”';
    if(d.sound){
      const a=$('a');a.src=SB+slug+'/sound.mp3';
      $('play').style.display='flex';$('tap').style.display='block';
      $('play').onclick=()=>{if(a.paused){a.play();$('tap').textContent='Playing…';}else{a.pause();a.currentTime=0;}};
      a.onended=a.onpause=()=>$('tap').textContent='Tap to hear '+(d.name||'them');
      $('tap').textContent='Tap to hear '+(d.name||'them');
    }
  }catch(e){}
}
load();
</script></body></html>
