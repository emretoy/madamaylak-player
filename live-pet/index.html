<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Your Pet, Alive — Madam Aylak</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:ital@1&family=Inter:wght@600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}body{background:#0b0a08;color:#f2e9d6;font-family:Inter;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px 18px 40px;overflow-x:hidden;}
.logo{font-weight:600;letter-spacing:.34em;font-size:11px;color:#9a8c72;text-transform:uppercase;margin:8px 0 16px;}
.card{position:relative;width:min(420px,94vw);aspect-ratio:1/1;border-radius:16px;overflow:hidden;box-shadow:0 22px 54px rgba(0,0,0,.6);border:1px solid rgba(176,122,68,.3);}
video{width:100%;height:100%;object-fit:cover;display:block;}
#cv{position:absolute;left:0;right:0;bottom:0;width:100%;height:66px;z-index:2;pointer-events:none;}
.band{position:absolute;left:0;right:0;bottom:0;padding:52px 18px 14px;background:linear-gradient(to top,rgba(6,5,8,.9),transparent);text-align:center;z-index:3;}
.n{font-family:'Playfair Display';font-size:24px;}.dt{font-family:'Cormorant Garamond';font-style:italic;font-size:18px;color:#c2a35e;margin-top:2px;}
.play{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;cursor:pointer;background:rgba(8,6,8,.42);transition:opacity .5s;}
.pbtn{width:76px;height:76px;border-radius:50%;border:2px solid #c2a35e;display:flex;align-items:center;justify-content:center;background:rgba(176,122,68,.16);}
.pbtn:after{content:'';border-left:21px solid #f2e9d6;border-top:13px solid transparent;border-bottom:13px solid transparent;margin-left:6px;}
.phint{margin-top:16px;font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#c2a35e;}
.note{margin-top:22px;max-width:380px;text-align:center;font-family:'Cormorant Garamond';font-style:italic;font-size:20px;color:#bca888;line-height:1.45;}
.foot{margin-top:24px;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#6a6258;}
</style></head><body>
<div class="logo">Madam Aylak</div>
<div class="card"><video id="vid" src="demo.mp4" loop playsinline></video>
<canvas id="cv" width="840" height="132"></canvas>
<div class="band"><div class="n">Buddy</div><div class="dt">their sound, forever</div></div>
<div class="play" id="play"><div class="pbtn"></div><div class="phint">tap — see &amp; hear them</div></div></div>
<div class="note">A live demo. Your pet gently comes to life while their real sound plays — the wave shows their voice. Your own recording would play here.</div>
<div class="foot">Madam Aylak &middot; Living Memory</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),W=840;const vid=document.getElementById('vid');let ac,an,freq,on=false;
function initA(){ac=new (window.AudioContext||window.webkitAudioContext)();const s=ac.createMediaElementSource(vid);an=ac.createAnalyser();an.fftSize=256;freq=new Uint8Array(an.frequencyBinCount);s.connect(an);an.connect(ac.destination);}
function frame(){requestAnimationFrame(frame);ctx.clearRect(0,0,W,132);if(!an)return;an.getByteFrequencyData(freq);const n=58,bw=W/n;for(let i=0;i<n;i++){const v=freq[Math.floor(i/n*90)]/255;const h=5+v*60;ctx.fillStyle=`rgba(194,163,94,${0.45+v*0.5})`;ctx.fillRect(i*bw+bw*0.32,132-h,bw*0.36,h);}}
document.getElementById('play').addEventListener('click',function(){if(!on){initA();on=true;frame();}ac.resume();vid.play();this.style.opacity=0;setTimeout(()=>this.style.display='none',500);});
</script></body></html>
